info:
  name: add-user-interests
  type: http
  seq: 2

http:
  method: POST
  url: "{{localhost}}/users/interests"
  headers:
    Authorization: "Bearer {{token}}"
  body:
    type: json
    data: |-
      {
        "interestNames": ["Technologie", "Écologie", "Finance"]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
