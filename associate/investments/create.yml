info:
  name: create-investment
  type: http
  seq: 1

http:
  method: POST
  url: "{{localhost}}/investments"
  headers:
    Authorization: "Bearer {{token}}"
  body:
    type: json
    data: |-
      {
        "amount": 1000,
        "projectId": { "id": "{{projectId}}" }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
