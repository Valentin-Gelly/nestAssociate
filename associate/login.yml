info:
  name: login
  type: http
  seq: 1

http:
  method: POST
  url: "{{localhost}}/auth/login"
  params:
    - name: email
      value: ""
      type: query
      disabled: true
    - name: password
      value: ""
      type: query
      disabled: true
  body:
    type: json
    data: |-
      {
        "email": "entrepreneur@entrepreneur.com",
        "password":"$Password0"
      }
  auth: inherit

runtime:
  variables:
    - name: localhost
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
